# Tiny QDoRA adapter inference configuration.
model: { d_model: 64, n_layers: 6, n_heads_q: 4, n_heads_kv: 2, d_head: 16, d_kv_compressed: 16, d_q_compressed: 24, d_head_rope: 8, d_ffn: 128, vocab_size: 1000, max_seq_len: 256, rope_base: 10000.0, rope_scaling: 1.0, dropout: 0.0 }
attention: { global_layer_freq: 6, local_window: 64, flash: false }
moe: { enabled: true, n_experts: 4, n_active: 2, n_shared: 1, moe_layer_freq: 2, balancer_alpha: 0.001 }
skip_gate: { enabled: true, hidden_dim: 16, threshold: 0.15 }
multi_token_head: { enabled: true, n_predict: 4, lambda_spec: 0.1 }
thinking: { enabled: true, max_thinking_tokens: 64 }
generation: { max_new_tokens: 64, temperature: 0.7, top_p: 0.9, top_k: 0, repetition_penalty: 1.0, enable_thinking: false, max_thinking_tokens: 64, thinking_temperature: 0.6, output_temperature: 0.3, use_speculative: true }
peft: { enabled: true, method: qdora, r: 4, alpha: 8, dropout: 0.0, freeze_base_model: true, quantization_bits: 4, quant_type: nf4, double_quant: true, compute_dtype: float32 }
training: { batch_size: 2, seq_len: 64, peak_lr: 0.0001, min_lr_ratio: 0.1, warmup_steps: 10, max_steps: 20, grad_clip: 1.0, weight_decay: 0.1, optimizer: adamw, beta1: 0.9, beta2: 0.95, eps: 0.00000001, gradient_accumulation_steps: 1, mixed_precision: fp16 }
grpo: { G: 4, beta: 0.04, lambda_prm: 0.3, lambda_cai: 0.3, clip_eps: 0.2 }
